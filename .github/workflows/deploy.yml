name: Deploy to OrbStack

on:
  push:
    branches: [ main ]

env:
  DEBUG: False
  ALLOWED_HOSTS: "questlog.omnyist.com,questlog-server,saya,localhost"
  DATABASE_URL: postgresql://questlog:questlog@synthcore-postgres:5432/questlog
  REDIS_URL: redis://synthcore-redis:6379/2

jobs:
  test:
    runs-on: self-hosted
    # Self-hosted runner is macOS — GH Actions `services:` are Linux-only, so
    # spin throwaway Postgres/Redis via `docker run` (OrbStack) instead.
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v5

    - name: Start test services
      run: |
        docker rm -f questlog-ci-pg questlog-ci-redis 2>/dev/null || true
        docker run -d --name questlog-ci-pg \
          -e POSTGRES_DB=questlog -e POSTGRES_USER=questlog -e POSTGRES_PASSWORD=questlog \
          -p 5439:5432 postgres:16
        docker run -d --name questlog-ci-redis -p 6399:6379 redis:alpine
        timeout 60 sh -c 'until docker exec questlog-ci-pg pg_isready -U questlog; do sleep 1; done'

    - name: Run tests
      env:
        DATABASE_URL: postgresql://questlog:questlog@localhost:5439/questlog
        REDIS_URL: redis://localhost:6399/0
      run: uv run --group dev pytest -q

    - name: Stop test services
      if: always()
      run: docker rm -f questlog-ci-pg questlog-ci-redis 2>/dev/null || true

  deploy:
    runs-on: self-hosted
    # TODO: add `needs: test` once the test job is confirmed green in CI,
    # so a failing suite blocks the deploy. Ungated for the first run to
    # avoid blocking deploys on an unverified CI job.
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 10

    - name: Create production .env file
      run: |
        cat > .env << EOF
        DEBUG=${{ env.DEBUG }}
        SECRET_KEY=${{ secrets.SECRET_KEY }}
        ALLOWED_HOSTS=${{ env.ALLOWED_HOSTS }}
        DATABASE_URL=${{ env.DATABASE_URL }}
        REDIS_URL=${{ env.REDIS_URL }}
        TWITCH_CLIENT_ID=${{ vars.TWITCH_CLIENT_ID }}
        TWITCH_CLIENT_SECRET=${{ secrets.TWITCH_CLIENT_SECRET }}
        BUNGIE_API_KEY=${{ secrets.BUNGIE_API_KEY }}
        STEAM_API_KEY=${{ secrets.STEAM_API_KEY }}
        STEAM_ID=${{ vars.STEAM_ID }}
        WARFRAME_ACCOUNT_ID=${{ secrets.WARFRAME_ACCOUNT_ID }}
        WARFRAME_PLATFORM=pc
        API_KEY=${{ secrets.API_KEY }}
        SENTRY_DSN=${{ secrets.SENTRY_DSN }}
        EOF

    - name: Deploy containers
      run: |
        docker compose -f docker-compose.prod.yml up --build -d --remove-orphans

    - name: Wait for services to be ready
      run: |
        timeout 60 sh -c 'until docker exec synthcore-postgres pg_isready -U questlog -d questlog; do sleep 1; done'
        sleep 5

    - name: Collect static files
      run: |
        docker compose -f docker-compose.prod.yml exec -T server uv run python manage.py collectstatic --noinput

    - name: Clean up old Docker images
      run: |
        docker image prune -f
