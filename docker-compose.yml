services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://questlog:questlog@synthcore-postgres:5432/questlog
      - REDIS_URL=redis://synthcore-redis:6379/2
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-change-in-production
    volumes:
      - .:/app
    ports:
      - "7176:7176"
    networks:
      - default
      - synth
    command: >
      sh -c "uv run python manage.py migrate &&
             uv run python manage.py runserver 0.0.0.0:7176"

networks:
  default:
  synth:
    external: true
