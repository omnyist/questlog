services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: questlog
      POSTGRES_USER: questlog
      POSTGRES_PASSWORD: questlog
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://questlog:questlog@db:5432/questlog
      - REDIS_URL=redis://synthcore-redis-1:6379/2
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-change-in-production
    volumes:
      - .:/app
    ports:
      - "7176:7176"
    networks:
      - default
      - synth
    command: >
      sh -c "uv run python manage.py migrate &&
             uv run python manage.py runserver 0.0.0.0:7176"

networks:
  default:
  synth:
    external: true

volumes:
  postgres_data:
