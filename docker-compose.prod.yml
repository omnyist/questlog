services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: questlog-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://questlog:questlog@synthcore-postgres:5432/questlog
      - REDIS_URL=redis://synthcore-redis:6379/2
    ports:
      - "7176:7176"
    networks:
      - default
      - synth
    command: >
      sh -c "uv run python manage.py migrate &&
             uv run daphne -b 0.0.0.0 -p 7176 config.asgi:application"

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: questlog-celery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://questlog:questlog@synthcore-postgres:5432/questlog
      - REDIS_URL=redis://synthcore-redis:6379/2
    networks:
      - default
      - synth
    command: uv run celery -A config worker -l info -B

networks:
  default:
  synth:
    external: true

